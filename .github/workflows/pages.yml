name: Deploy Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build_windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build (MSVC)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCASSETTE_BUILD_TESTS=OFF
          cmake --build build --config Release -j 3

      - name: Package Windows zip for Pages
        shell: pwsh
        run: |
          $dir = "build/Deck_artefacts/Release"
          $exe = Get-ChildItem -Path $dir -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { throw "Deck executable not found under $dir" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $exe.FullName dist/
          Compress-Archive -Path dist/* -DestinationPath Deck-Windows-latest.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: Deck-Windows-pages
          path: Deck-Windows-latest.zip
          retention-days: 14

  deploy:
    needs: build_windows
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows package
        uses: actions/download-artifact@v4
        with:
          name: Deck-Windows-pages
          path: page-build/downloads

      - name: Prepare Pages content
        run: |
          rm -rf page-build/site
          mkdir -p page-build/site
          cp -R docs/. page-build/site/
          mkdir -p page-build/site/downloads
          cp page-build/downloads/Deck-Windows-latest.zip page-build/site/downloads/Deck-Windows-latest.zip

      - uses: actions/upload-pages-artifact@v3
        with:
          path: page-build/site

      - id: deployment
        uses: actions/deploy-pages@v4
