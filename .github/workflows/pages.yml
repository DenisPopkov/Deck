name: Deploy Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'Source/**'
              - 'cmake/**'
              - 'CMakeLists.txt'
              - 'Assets/**'
              - 'scripts/build_windows_msvc.ps1'
              - 'Makefile'
              - 'scripts/package_linux.sh'
              - 'scripts/package_legacy_mac.sh'
              - 'scripts/verify_mac_app.sh'
              - 'scripts/find_deck_binary.sh'
              - '.github/workflows/pages.yml'
              - 'docs/**'

  build_windows:
    needs: changes
    if: needs.changes.outputs.app == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build (MSVC)
        run: |
          cmake -C cmake/ProdOptions.cmake -B build -DCMAKE_BUILD_TYPE=Release -DCASSETTE_BUILD_TESTS=OFF
          cmake --build build --config Release -j 3

      - name: Package Windows zip for Pages
        shell: pwsh
        run: |
          $dir = "build/Deck_artefacts/Release"
          $exe = Get-ChildItem -Path $dir -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { throw "Deck executable not found under $dir" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $exe.FullName dist/
          Compress-Archive -Path dist/* -DestinationPath Deck-Windows-latest.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: Deck-Windows-pages
          path: Deck-Windows-latest.zip
          retention-days: 14

  build_linux:
    needs: changes
    if: needs.changes.outputs.app == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config \
            libasound2-dev libfreetype6-dev libfontconfig1-dev libcurl4-openssl-dev \
            libx11-dev libxrandr-dev libxcursor-dev libxinerama-dev libxext-dev libxrender-dev \
            libgl-dev libglu1-mesa-dev

      - name: Configure and build
        run: |
          cmake -C cmake/ProdOptions.cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCASSETTE_BUILD_TESTS=OFF
          cmake --build build --target Deck --parallel

      - name: Package Linux tarball for Pages
        run: |
          VERSION="$(sed -n 's/^project(Deck VERSION \([0-9.]*\).*/\1/p' CMakeLists.txt)"
          ./scripts/package_linux.sh build Release "$VERSION"
          cp "dist/Deck-${VERSION}-Linux.tar.gz" Deck-Linux-latest.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: Deck-Linux-pages
          path: Deck-Linux-latest.tar.gz
          retention-days: 14

  build_macos_legacy:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build Mojave package
        env:
          CASSETTE_SKIP_APP_ICON: ON
        run: ./scripts/package_legacy_mac.sh

      - name: Stage Pages zip
        run: cp dist/Deck-*-macOS-Mojave.zip Deck-macOS-Mojave-latest.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Deck-macOS-Mojave-pages
          path: Deck-macOS-Mojave-latest.zip
          retention-days: 14

  deploy:
    needs: [changes, build_windows, build_linux, build_macos_legacy]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore cached Windows package
        uses: actions/cache/restore@v4
        with:
          path: cached-downloads
          key: deck-windows-latest
          restore-keys: deck-windows-

      - name: Restore cached Linux package
        uses: actions/cache/restore@v4
        with:
          path: cached-linux-downloads
          key: deck-linux-latest
          restore-keys: deck-linux-

      - name: Restore cached Mojave package
        uses: actions/cache/restore@v4
        with:
          path: cached-macos-legacy-downloads
          key: deck-macos-mojave-latest
          restore-keys: deck-macos-mojave-

      - name: Download Windows package
        if: needs.build_windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: Deck-Windows-pages
          path: fresh-windows-downloads

      - name: Download Linux package
        if: needs.build_linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: Deck-Linux-pages
          path: fresh-linux-downloads

      - name: Download Mojave package
        if: needs.build_macos_legacy.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: Deck-macOS-Mojave-pages
          path: fresh-macos-legacy-downloads

      - name: Update Windows package cache
        if: needs.build_windows.result == 'success'
        run: |
          rm -rf cached-downloads
          mkdir -p cached-downloads
          cp fresh-windows-downloads/Deck-Windows-latest.zip cached-downloads/

      - uses: actions/cache/save@v4
        if: needs.build_windows.result == 'success'
        with:
          path: cached-downloads
          key: deck-windows-latest

      - name: Update Linux package cache
        if: needs.build_linux.result == 'success'
        run: |
          rm -rf cached-linux-downloads
          mkdir -p cached-linux-downloads
          cp fresh-linux-downloads/Deck-Linux-latest.tar.gz cached-linux-downloads/

      - uses: actions/cache/save@v4
        if: needs.build_linux.result == 'success'
        with:
          path: cached-linux-downloads
          key: deck-linux-latest

      - name: Update Mojave package cache
        if: needs.build_macos_legacy.result == 'success'
        run: |
          rm -rf cached-macos-legacy-downloads
          mkdir -p cached-macos-legacy-downloads
          cp fresh-macos-legacy-downloads/Deck-macOS-Mojave-latest.zip cached-macos-legacy-downloads/

      - uses: actions/cache/save@v4
        if: needs.build_macos_legacy.result == 'success'
        with:
          path: cached-macos-legacy-downloads
          key: deck-macos-mojave-latest

      - name: Prepare Pages content
        run: |
          rm -rf page-build/site
          mkdir -p page-build/site/downloads
          cp -R docs/. page-build/site/
          test -f page-build/site/downloads/Deck-macOS-Mojave-latest.zip || echo "WARN: no committed Mojave zip in docs/downloads"
          if [ -f fresh-windows-downloads/Deck-Windows-latest.zip ]; then
            cp fresh-windows-downloads/Deck-Windows-latest.zip page-build/site/downloads/Deck-Windows-latest.zip
          elif [ -f cached-downloads/Deck-Windows-latest.zip ]; then
            cp cached-downloads/Deck-Windows-latest.zip page-build/site/downloads/Deck-Windows-latest.zip
          fi
          if [ -f fresh-linux-downloads/Deck-Linux-latest.tar.gz ]; then
            cp fresh-linux-downloads/Deck-Linux-latest.tar.gz page-build/site/downloads/Deck-Linux-latest.tar.gz
          elif [ -f cached-linux-downloads/Deck-Linux-latest.tar.gz ]; then
            cp cached-linux-downloads/Deck-Linux-latest.tar.gz page-build/site/downloads/Deck-Linux-latest.tar.gz
          fi
          if [ -f fresh-macos-legacy-downloads/Deck-macOS-Mojave-latest.zip ]; then
            cp fresh-macos-legacy-downloads/Deck-macOS-Mojave-latest.zip page-build/site/downloads/Deck-macOS-Mojave-latest.zip
          elif [ -f cached-macos-legacy-downloads/Deck-macOS-Mojave-latest.zip ]; then
            cp cached-macos-legacy-downloads/Deck-macOS-Mojave-latest.zip page-build/site/downloads/Deck-macOS-Mojave-latest.zip
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: page-build/site

      - id: deployment
        uses: actions/deploy-pages@v4
