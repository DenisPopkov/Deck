name: Deploy Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'Source/**'
              - 'cmake/**'
              - 'CMakeLists.txt'
              - 'Assets/**'
              - 'scripts/build_windows_msvc.ps1'

  build_windows:
    needs: changes
    if: needs.changes.outputs.app == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build (MSVC)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCASSETTE_BUILD_TESTS=OFF
          cmake --build build --config Release -j 3

      - name: Package Windows zip for Pages
        shell: pwsh
        run: |
          $dir = "build/Deck_artefacts/Release"
          $exe = Get-ChildItem -Path $dir -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { throw "Deck executable not found under $dir" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $exe.FullName dist/
          Compress-Archive -Path dist/* -DestinationPath Deck-Windows-latest.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: Deck-Windows-pages
          path: Deck-Windows-latest.zip
          retention-days: 14

  deploy:
    needs: [changes, build_windows]
    if: always() && !cancelled() && (needs.build_windows.result == 'success' || needs.build_windows.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore cached Windows package
        uses: actions/cache/restore@v4
        id: win_cache
        with:
          path: cached-downloads
          key: deck-windows-latest
          restore-keys: deck-windows-

      - name: Download Windows package
        if: needs.build_windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: Deck-Windows-pages
          path: fresh-downloads

      - name: Update Windows package cache
        if: needs.build_windows.result == 'success'
        run: |
          rm -rf cached-downloads
          mkdir -p cached-downloads
          cp fresh-downloads/Deck-Windows-latest.zip cached-downloads/

      - uses: actions/cache/save@v4
        if: needs.build_windows.result == 'success'
        with:
          path: cached-downloads
          key: deck-windows-latest

      - name: Prepare Pages content
        run: |
          rm -rf page-build/site
          mkdir -p page-build/site
          cp -R docs/. page-build/site/
          mkdir -p page-build/site/downloads
          if [ -f fresh-downloads/Deck-Windows-latest.zip ]; then
            cp fresh-downloads/Deck-Windows-latest.zip page-build/site/downloads/Deck-Windows-latest.zip
          elif [ -f cached-downloads/Deck-Windows-latest.zip ]; then
            cp cached-downloads/Deck-Windows-latest.zip page-build/site/downloads/Deck-Windows-latest.zip
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: page-build/site

      - id: deployment
        uses: actions/deploy-pages@v4
