name: Linux build

on:
  push:
    branches: [main, master]
    paths:
      - 'Source/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'Assets/**'
      - 'Makefile'
      - 'scripts/package_linux.sh'
      - 'scripts/find_deck_binary.sh'
      - '.github/workflows/linux-build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'Source/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'Assets/**'
      - 'Makefile'
      - 'scripts/package_linux.sh'
      - 'scripts/find_deck_binary.sh'
      - '.github/workflows/linux-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config \
            libasound2-dev libfreetype6-dev libfontconfig1-dev libcurl4-openssl-dev \
            libx11-dev libxrandr-dev libxcursor-dev libxinerama-dev libxext-dev libxrender-dev \
            libgl-dev libglu1-mesa-dev

      - name: Configure and build
        run: |
          cmake -C cmake/ProdOptions.cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCASSETTE_BUILD_TESTS=OFF -DCASSETTE_ENABLE_PI_TAPE=OFF
          cmake --build build --target Deck --parallel

      - name: Package tarball
        run: |
          VERSION="$(sed -n 's/^project(Deck VERSION \([0-9.]*\).*/\1/p' CMakeLists.txt)"
          ./scripts/package_linux.sh build Release "$VERSION"
          cp "dist/Deck-${VERSION}-Linux.tar.gz" Deck-Linux.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: Deck-Linux
          path: Deck-Linux.tar.gz
          retention-days: 14
