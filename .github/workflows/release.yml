name: Release builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCASSETTE_BUILD_TESTS=OFF -DCASSETTE_SKIP_APP_ICON=ON
          cmake --build build --config Release --target Deck -j3

      - name: Package zip
        run: |
          APP="build/Deck_artefacts/Release/Deck.app"
          ditto -c -k --sequesterRsrc --keepParent "$APP" Deck-macOS.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Deck-macOS
          path: Deck-macOS.zip
          retention-days: 14

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build (MSVC)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCASSETTE_BUILD_TESTS=OFF
          cmake --build build --config Release --target Deck -j 3

      - name: Package zip
        shell: pwsh
        run: |
          $dir = "build/Deck_artefacts/Release"
          $exe = Get-ChildItem -Path $dir -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { throw "Deck executable not found under $dir" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $exe.FullName dist/
          Compress-Archive -Path dist/* -DestinationPath Deck-Windows.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: Deck-Windows
          path: Deck-Windows.zip
          retention-days: 14

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config \
            libasound2-dev libfreetype6-dev libfontconfig1-dev libcurl4-openssl-dev \
            libx11-dev libxrandr-dev libxcursor-dev libxinerama-dev libxext-dev libxrender-dev \
            libgl-dev libglu1-mesa-dev

      - name: Configure and build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCASSETTE_BUILD_TESTS=OFF
          cmake --build build --target Deck --parallel

      - name: Package tarball
        run: |
          VERSION="$(sed -n 's/^project(Deck VERSION \([0-9.]*\).*/\1/p' CMakeLists.txt)"
          ./scripts/package_linux.sh build Release "$VERSION"
          cp "dist/Deck-${VERSION}-Linux.tar.gz" Deck-Linux.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: Deck-Linux
          path: Deck-Linux.tar.gz
          retention-days: 14

  release:
    needs: [macos, windows, linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          find artifacts -name 'Deck-Windows.zip' -exec cp {} . \;
          find artifacts -name 'Deck-Linux.tar.gz' -exec cp {} . \;
          find artifacts -name 'Deck-macOS.zip' -exec cp {} . \;
          ls -la Deck-macOS.zip Deck-Windows.zip Deck-Linux.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Deck-macOS.zip
            Deck-Windows.zip
            Deck-Linux.tar.gz
