name: Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'Source/**'
      - 'Tests/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'scripts/generate_test_fixture.py'
      - 'scripts/run_audit.sh'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'Source/**'
      - 'Tests/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'scripts/generate_test_fixture.py'
      - 'scripts/run_audit.sh'
      - '.github/workflows/tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deck-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config \
            libasound2-dev libfreetype6-dev libfontconfig1-dev libcurl4-openssl-dev \
            libx11-dev libxrandr-dev libxcursor-dev libxinerama-dev libxext-dev libxrender-dev \
            libgl-dev libglu1-mesa-dev

      - name: Generate mini album fixture
        run: python3 scripts/generate_test_fixture.py

      - name: Configure
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DCASSETTE_BUILD_TESTS=ON
          else
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCASSETTE_BUILD_TESTS=ON
          fi

      - name: Build DeckTests
        run: cmake --build build --config Release --target DeckTests --parallel

      - name: Run tests (mini fixture smoke)
        shell: bash
        env:
          CASSETTE_FIXTURE_ALBUM: ${{ github.workspace }}/Tests/Fixtures/mini-album
        run: ctest --test-dir build -C Release --output-on-failure
