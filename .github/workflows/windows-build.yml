name: Windows build

on:
  push:
    branches: [main, master]
    paths:
      - 'Source/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'Assets/**'
      - 'scripts/build_windows_msvc.ps1'
      - '.github/workflows/windows-build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'Source/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'Assets/**'
      - 'scripts/build_windows_msvc.ps1'
      - '.github/workflows/windows-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build (MSVC)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCASSETTE_BUILD_TESTS=OFF
          cmake --build build --config Release -j 3

      - name: Package zip
        shell: pwsh
        run: |
          $dir = "build/Deck_artefacts/Release"
          $exe = Get-ChildItem -Path $dir -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { throw "Deck executable not found under $dir" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $exe.FullName dist/
          Compress-Archive -Path dist/* -DestinationPath Deck-Windows.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: Deck-Windows
          path: Deck-Windows.zip
          retention-days: 14
